<!DOCTYPE html>
<html lang="mr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>दृष्टि न्यूज 24</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1d4350, #a43931);
    }

    .header {
      background: #b30000;
      color: white;
      text-align: center;
      padding: 25px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.9;
      margin-top: 5px;
    }

    .container {
      max-width: 750px;
      margin: 30px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card {
      background: #f7f7f7;
      padding: 15px;
      margin: 12px 0;
      border-radius: 8px;
      border-left: 5px solid #b30000;
      font-size: 18px;
    }

    .label {
      font-weight: bold;
      color: #333;
    }

    .founders {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .founder {
      background: #fff;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-size: 16px;
    }

    .contact {
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
      text-align: center;
    }

    .phone {
      font-size: 20px;
      color: #0066cc;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #666;
    }

    @media(max-width:600px) {
      .founders {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>दृष्टि न्यूज 24</h1>
    <div class="tagline">पहा सत्य खबर</div>
  </div>

  <div class="container">

    <div class="card">
      <span class="label">स्थापना :</span> सन 2020
    </div>

    <div class="card">
      <span class="label">रजि नंबर :</span> MH - 30 - 0028973
    </div>

    <div class="card">
      <span class="label">संस्थापक :</span>

      <div class="founders">
        <div class="founder">श्री आशिष चव्हाण</div>
        <div class="founder">श्री धनाजी पवार</div>
        <div class="founder">पुजा भंडलकर</div>
      </div>

    </div>

    <div class="contact">
      <h3>मुख्य संपर्क</h3>
      <b>श्री आशिष चव्हाण</b><br>
तालुका वाई, जिल्हा सातारा<br><br>

संपर्क :
      <div class="phone">8080906949</div>
    </div>

  </div>

  <div class="footer">
    © 2020 Drishti News 24
  </div>

</body>

</html>
